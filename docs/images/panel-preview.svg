<svg width="780" height="500" viewBox="0 0 780 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UsageBar popover preview</title>
  <desc id="desc">A translucent macOS popover showing CPU, memory, disk, concrete usage numbers, and 60 second sparklines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f7f7f8"/>
      <stop offset="1" stop-color="#dadde2"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#000" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="780" height="500" fill="url(#bg)"/>
  <circle cx="632" cy="104" r="86" fill="#ffffff" opacity=".55"/>
  <circle cx="176" cy="416" r="110" fill="#c9d4df" opacity=".45"/>
  <g filter="url(#softShadow)">
    <rect x="220" y="74" width="340" height="352" rx="14" fill="#f8f8fa" opacity=".86" stroke="#ffffff"/>
    <g font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif">
      <circle cx="250" cy="108" r="12" fill="#34c759" opacity=".16"/>
      <path d="M244 109h12M250 103v12" stroke="#248a3d" stroke-width="1.6" stroke-linecap="round"/>
      <text x="274" y="106" font-size="15" font-weight="700" fill="#1d1d1f">Healthy</text>
      <text x="274" y="125" font-size="11" fill="#6e6e73">Updated 14:55:02</text>
      <rect x="500" y="94" width="36" height="20" rx="10" fill="#34c759" opacity=".14"/>
      <text x="510" y="108" font-size="10" font-weight="700" fill="#248a3d">OK</text>
      <g transform="translate(244 158)">
        <text x="0" y="0" font-size="13" font-weight="650" fill="#1d1d1f">CPU</text>
        <text x="246" y="0" font-size="13" font-weight="700" fill="#248a3d" text-anchor="end">38%</text>
        <rect x="0" y="14" width="246" height="5" rx="2.5" fill="#d9d9de"/>
        <rect x="0" y="14" width="94" height="5" rx="2.5" fill="#34c759"/>
        <path d="M0 55 L26 49 L52 52 L78 37 L104 42 L130 32 L156 40 L182 26 L208 34 L246 24" stroke="#34c759" stroke-width="2" fill="none"/>
        <text x="0" y="82" font-size="11" fill="#6e6e73">Current load 38% · 12 cores</text>
      </g>
      <g transform="translate(244 258)">
        <text x="0" y="0" font-size="13" font-weight="650" fill="#1d1d1f">Memory</text>
        <text x="246" y="0" font-size="13" font-weight="700" fill="#b26a00" text-anchor="end">67%</text>
        <rect x="0" y="14" width="246" height="5" rx="2.5" fill="#d9d9de"/>
        <rect x="0" y="14" width="165" height="5" rx="2.5" fill="#ff9f0a"/>
        <path d="M0 55 L26 44 L52 47 L78 38 L104 40 L130 36 L156 28 L182 32 L208 27 L246 31" stroke="#ff9f0a" stroke-width="2" fill="none"/>
        <text x="0" y="82" font-size="11" fill="#6e6e73">Used 10.7 GB / 16 GB · Pressure Watch</text>
      </g>
      <g transform="translate(244 358)">
        <text x="0" y="0" font-size="13" font-weight="650" fill="#1d1d1f">Disk</text>
        <text x="246" y="0" font-size="13" font-weight="700" fill="#248a3d" text-anchor="end">51%</text>
        <rect x="0" y="14" width="246" height="5" rx="2.5" fill="#d9d9de"/>
        <rect x="0" y="14" width="125" height="5" rx="2.5" fill="#34c759"/>
        <path d="M0 55 L26 54 L52 53 L78 52 L104 52 L130 51 L156 51 L182 50 L208 49 L246 49" stroke="#34c759" stroke-width="2" fill="none"/>
      </g>
    </g>
  </g>
</svg>
