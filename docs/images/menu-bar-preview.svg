<svg width="780" height="150" viewBox="0 0 780 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CoreBar menu bar preview</title>
  <desc id="desc">A macOS menu bar preview with CPU, MEM, and DSK labels and thin usage bars.</desc>
  <defs>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#f7f7f7"/>
      <stop offset="1" stop-color="#d9d9d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-80%" width="140%" height="260%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="780" height="150" fill="#f5f5f7"/>
  <g filter="url(#shadow)">
    <rect x="58" y="34" width="664" height="44" rx="12" fill="url(#bar)" stroke="#cfcfd4"/>
    <text x="84" y="62" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif" font-size="15" fill="#2f3034">Finder</text>
    <text x="560" y="62" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif" font-size="13" fill="#4a4b50">Thu 14:55</text>
    <g transform="translate(644 43)" fill="#17181b">
      <g transform="translate(0 0)">
        <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="0">CPU</text>
        <rect x="1" y="17" width="16" height="3" fill="#8e8e93" opacity=".5"/>
        <rect x="1" y="17" width="7" height="3" fill="#17181b"/>
      </g>
      <g transform="translate(26 0)">
        <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="0">MEM</text>
        <rect x="1" y="17" width="18" height="3" fill="#8e8e93" opacity=".5"/>
        <rect x="1" y="17" width="11" height="3" fill="#17181b"/>
      </g>
      <g transform="translate(55 0)">
        <text x="0" y="10" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif" font-size="8" font-weight="700" letter-spacing="0">DSK</text>
        <rect x="1" y="17" width="15" height="3" fill="#8e8e93" opacity=".5"/>
        <rect x="1" y="17" width="9" height="3" fill="#17181b"/>
      </g>
    </g>
  </g>
  <text x="58" y="116" font-family="-apple-system, BlinkMacSystemFont, SF Pro Text, Helvetica, Arial, sans-serif" font-size="18" font-weight="650" fill="#1d1d1f">One compact menu bar item. Three readable signals.</text>
</svg>
